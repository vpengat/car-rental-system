{% extends "base.html" %}
{% block title %}Add Vehicle — DriveNow{% endblock %}

{% block content %}
<div style="margin-bottom:1rem;">
  <a href="{{ url_for('manage_vehicles') }}" class="btn btn-outline btn-sm">← Back to Fleet</a>
</div>

<div class="page-header">
  <h1>Add New Vehicle</h1>
  <p>Fill in the details to add a car to the fleet.</p>
</div>

<div class="form-card" style="max-width:560px;">
  <form method="POST">
    <div class="form-group">
      <label for="model">Vehicle Model *</label>
      <input type="text" id="model" name="model" placeholder="e.g. Toyota Camry" required>
    </div>
    <div class="form-group">
      <label for="category">Category *</label>
      <select id="category" name="category" required>
        <option value="" disabled selected>Select category…</option>
        <option>Sedan</option>
        <option>SUV</option>
        <option>Sports</option>
        <option>Luxury</option>
        <option>Electric</option>
        <option>Hatchback</option>
        <option>Van</option>
        <option>Truck</option>
      </select>
    </div>
    <div class="form-group">
      <label for="price_per_day">Price per Day ($) *</label>
      <input type="number" id="price_per_day" name="price_per_day"
             step="0.01" min="1" placeholder="e.g. 55.00" required>
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" name="description"
                placeholder="Brief description of the vehicle…"></textarea>
    </div>
    <div class="form-group">
      <div class="checkbox-group">
        <input type="checkbox" id="availability" name="availability" checked>
        <label for="availability">Mark as available immediately</label>
      </div>
    </div>
    <hr>
    <div style="display:flex;gap:.75rem;">
      <button type="submit" class="btn btn-primary">Add Vehicle</button>
      <a href="{{ url_for('manage_vehicles') }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
