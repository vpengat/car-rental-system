<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — DriveNow</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <h1>Drive<span>Now</span></h1>
      <p>Car Rental System</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <ul class="flash-list">
          {% for cat, msg in messages %}
            <li class="flash {{ cat }}">{{ msg }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:.5rem;">Sign In</button>
    </form>

    <div class="credentials-hint">
      <strong>🔑 Test Credentials</strong>
      Customer: <code>customer</code> / <code>123</code><br>
      Staff: <code>staff</code> / <code>123</code>
    </div>
  </div>
</div>
</body>
</html>
